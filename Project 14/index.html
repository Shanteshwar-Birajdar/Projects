<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Temperature Converter</h2>

    <!-- Manual Conversion -->
    <input type="number" id="tempInput" placeholder="Enter temperature">

    <div class="buttons">
        <button onclick="convertToFahrenheit()">Celsius → Fahrenheit</button>
        <button onclick="convertToCelsius()">Fahrenheit → Celsius</button>
    </div>

    <hr>

    <!-- City Temperature -->
    <input type="text" id="cityInput" placeholder="Enter city name">
    <button onclick="getCityTemperature()">Get City Temperature</button>

    <p id="result"></p>
</div>

<script src="script.js"></script>
</body>
</html>
